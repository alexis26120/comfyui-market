<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Unlock Content - ComfyUI Market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#050505",
                        surface: "#0A0A0A",
                        "border-subtle": "rgba(255, 255, 255, 0.08)",
                        "text-main": "#ffffff",
                        "text-muted": "#888888",
                        "accent-amber": "#F59E0B",
                        "accent-violet": "#8B5CF6",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    backgroundImage: {
                        'grain': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.07%22/%3E%3C/svg%3E')",
                    }
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #050505;
        }

        .bg-grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.45;
            mix-blend-mode: overlay;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }

        .btn-tactile {
            background: linear-gradient(180deg, rgba(30, 30, 30, 1) 0%, rgba(10, 10, 10, 1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 1px 2px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .secure-blur {
            filter: blur(20px);
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-background text-text-main font-sans min-h-screen flex flex-col relative">
    <div class="bg-grain bg-grain-overlay"></div>

    <header class="fixed top-0 w-full z-40 border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-4">
                <div
                    class="w-9 h-9 bg-white rounded flex items-center justify-center shadow-[0_0_15px_rgba(255,255,255,0.15)]">
                    <span class="material-symbols-outlined text-black text-[20px]">filter_vintage</span>
                </div>
                <div class="flex flex-col justify-center h-full">
                    <span class="font-display font-bold text-lg leading-none tracking-tight text-white">ComfyUI
                        Market</span>
                </div>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center relative px-4 pt-24 pb-12 z-10 w-full">
        <div class="w-full max-w-md mx-auto space-y-6" id="loading-state">
            <div class="text-center text-text-muted animate-pulse">Loading content...</div>
        </div>

        <div class="w-full max-w-md mx-auto space-y-6 hidden" id="content-card">
            <div class="glass-panel rounded-2xl overflow-hidden relative group border border-white/10">
                <!-- Preview Area -->
                <div class="relative w-full aspect-[4/3] bg-[#111] overflow-hidden flex items-center justify-center">

                    <!-- Secured/Blurred Content Placeholder -->
                    <div id="preview-blur"
                        class="absolute inset-0 bg-gradient-to-br from-indigo-900/20 to-purple-900/20 secure-blur opacity-50 flex items-center justify-center">
                        <span class="material-symbols-outlined text-9xl text-white/20">lock</span>
                    </div>

                    <!-- Lock Icon Overlay -->
                    <div id="lock-overlay" class="relative z-10 flex flex-col items-center gap-3">
                        <div
                            class="w-16 h-16 rounded-full bg-black/60 backdrop-blur border border-white/10 flex items-center justify-center shadow-2xl">
                            <span class="material-symbols-outlined text-3xl text-white">lock</span>
                        </div>
                        <p class="text-xs font-mono uppercase tracking-widest text-white/60">Secure Content</p>
                    </div>

                    <!-- Success State (Hidden initially) -->
                    <div id="success-icon" class="hidden relative z-10 flex flex-col items-center gap-3">
                        <div
                            class="w-16 h-16 rounded-full bg-emerald-500/20 backdrop-blur border border-emerald-500/30 flex items-center justify-center shadow-glow">
                            <span class="material-symbols-outlined text-3xl text-emerald-400">check_circle</span>
                        </div>
                    </div>
                </div>

                <!-- Info Area -->
                <div class="p-6 space-y-6">
                    <div>
                        <h1 id="file-name" class="font-display text-2xl font-bold text-white mb-1 truncate">
                            Filename_Placeholder.json</h1>
                        <p id="file-desc" class="text-sm text-text-muted">High-fidelity ComfyUI workflow.</p>
                    </div>

                    <div class="pt-4 border-t border-white/5 flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-xs text-text-muted uppercase tracking-wider">Price</span>
                            <span id="price-display" class="font-display text-2xl font-bold text-white">€0.00</span>
                        </div>
                        <button id="unlock-btn"
                            class="btn-tactile px-6 py-3 rounded-xl text-white font-bold tracking-wide shadow-lg hover:shadow-glow flex items-center gap-2 transition-all">
                            <span>Unlock Now</span>
                            <span class="material-symbols-outlined text-lg">lock_open</span>
                        </button>
                        <a id="download-btn" href="#"
                            class="hidden btn-tactile px-6 py-3 rounded-xl text-emerald-400 font-bold tracking-wide shadow-lg border-emerald-500/30 bg-emerald-900/10 hover:bg-emerald-900/20 flex items-center gap-2 transition-all">
                            <span>Download</span>
                            <span class="material-symbols-outlined text-lg">download</span>
                        </a>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-text-muted">
                Secured by Stripe • Instant Delivery
            </p>
        </div>

        <div id="error-state" class="hidden text-center text-red-400">
            <p>Content not found.</p>
        </div>
    </main>

    <script>
        // Get slug from URL
        const path = window.location.pathname;
        const slug = path.split('/').pop().split('.')[0]; // Handle /l/slug or just slug
        // In clean URLs via Netlify Rewrite, pathname might be /l/xyz
        const realSlug = path.replace('/l/', '');

        const contentCard = document.getElementById('content-card');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const unlockBtn = document.getElementById('unlock-btn');
        const downloadBtn = document.getElementById('download-btn');
        const lockOverlay = document.getElementById('lock-overlay');
        const successIcon = document.getElementById('success-icon');
        const previewBlur = document.getElementById('preview-blur');

        let currentProduct = null;

        async function init() {
            try {
                const response = await fetch(`/.netlify/functions/get-link?slug=${realSlug}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error);
                }

                currentProduct = data.product;

                // Populate DOM
                document.getElementById('file-name').textContent = currentProduct.name;
                document.getElementById('file-desc').textContent = currentProduct.description || 'Secure file';
                document.getElementById('price-display').textContent = '€' + parseFloat(currentProduct.price).toFixed(2);

                if (currentProduct.is_paid) {
                    showPaidState(currentProduct.download_url);
                }

                loadingState.classList.add('hidden');
                contentCard.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }

        function showPaidState(url) {
            unlockBtn.classList.add('hidden');
            downloadBtn.classList.remove('hidden');
            if (url) downloadBtn.href = url;

            lockOverlay.classList.add('hidden');
            successIcon.classList.remove('hidden');
            previewBlur.classList.remove('secure-blur');
            previewBlur.style.filter = 'blur(0px)';
            previewBlur.classList.add('opacity-100');
        }

        unlockBtn.addEventListener('click', async () => {
            const originalText = unlockBtn.innerHTML;
            unlockBtn.disabled = true;
            unlockBtn.innerHTML = 'Processing...';

            try {
                const response = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: currentProduct.id })
                });

                const result = await response.json();

                if (result.success) {
                    // Simulate refresh/success
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                } else {
                    alert('Payment Error');
                    unlockBtn.disabled = false;
                    unlockBtn.innerHTML = originalText;
                }
            } catch (e) {
                console.error(e);
                unlockBtn.disabled = false;
                unlockBtn.innerHTML = originalText;
            }
        });

        init();
    </script>
</body>

</html>
