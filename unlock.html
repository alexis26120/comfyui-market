<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Débloquer — ComfyUI Market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0D1117",
                        surface: "#161B22",
                        "surface-2": "#1C2128",
                        "text-main": "#E6EDF3",
                        "text-muted": "#7D8590",
                        "text-dim": "#484F58",
                        "go": "#3FB950",
                        "go-deep": "#238636",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        body { background-color: #0D1117; }

        .panel { background: #161B22; border: 1px solid #30363D; }
        .panel-hd { background: #1C2128; border-bottom: 1px solid #30363D; }

        .btn-primary {
            background: #238636;
            border: 1px solid rgba(63, 185, 80, 0.4);
            color: #fff;
            transition: background 0.15s ease;
        }
        .btn-primary:hover:not(:disabled) { background: #2ea043; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-ghost {
            background: #161B22;
            border: 1px solid #30363D;
            color: #E6EDF3;
            transition: background 0.15s ease;
        }
        .btn-ghost:hover { background: #1C2128; }

        .btn-download {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: #3FB950;
            transition: background 0.15s ease;
        }
        .btn-download:hover { background: rgba(63, 185, 80, 0.18); }
    </style>
</head>

<body class="bg-background text-text-main font-sans min-h-screen flex flex-col">

    <header class="sticky top-0 z-40 w-full bg-surface border-b border-[#30363D]">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center">
            <a href="/" class="flex items-center gap-3">
                <img src="/logo.svg" alt="Logo" style="height: 22px; width: auto;" class="block opacity-90">
                <span class="font-mono font-bold text-sm text-text-main tracking-tight">ComfyUI Market</span>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-16">

        <!-- Chargement -->
        <div id="loading-state" class="font-mono text-xs text-text-muted animate-pulse">
            &gt; chargement du contenu...
        </div>

        <!-- Carte contenu -->
        <div class="w-full max-w-sm mx-auto hidden" id="content-card">
            <div class="panel rounded-md overflow-hidden">

                <!-- En-tête panneau -->
                <div class="panel-hd px-4 py-2 flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-text-dim"></span>
                    <span id="status-label" class="font-mono text-xs text-text-dim">// contenu verrouillé</span>
                </div>

                <!-- Zone prévisualisation -->
                <div class="relative w-full aspect-[4/3] bg-background flex items-center justify-center overflow-hidden border-b border-[#30363D]">
                    <!-- État verrouillé -->
                    <div id="lock-overlay" class="flex flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-5xl text-text-dim">lock</span>
                        <p class="font-mono text-xs text-text-dim uppercase tracking-widest">Contenu sécurisé</p>
                    </div>
                    <!-- État débloqué (caché) -->
                    <div id="success-icon" class="hidden flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-5xl text-go">check_circle</span>
                        <p class="font-mono text-xs text-go uppercase tracking-widest">Accès accordé</p>
                    </div>
                </div>

                <!-- Informations -->
                <div class="p-5 space-y-5">
                    <div>
                        <p class="font-mono text-xs text-text-dim mb-1">// fichier</p>
                        <h1 id="file-name" class="font-mono text-base font-bold text-text-main truncate">chargement...</h1>
                        <p id="file-desc" class="text-xs text-text-muted mt-1">Workflow ComfyUI</p>
                    </div>

                    <div class="border-t border-[#30363D] pt-4 flex items-center justify-between gap-3">
                        <div>
                            <p class="font-mono text-xs text-text-dim">// prix</p>
                            <p id="price-display" class="font-mono text-2xl font-bold text-text-main">€0.00</p>
                        </div>
                        <button id="unlock-btn"
                            class="btn-primary px-5 py-2.5 rounded font-mono text-sm font-medium flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">lock_open</span>
                            Débloquer
                        </button>
                        <a id="download-btn" href="#"
                            class="hidden btn-download px-5 py-2.5 rounded font-mono text-sm font-medium flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">download</span>
                            Télécharger
                        </a>
                    </div>
                </div>
            </div>

            <p class="text-center font-mono text-xs text-text-dim mt-4">
                Sécurisé par Stripe · Livraison instantanée
            </p>
        </div>

        <!-- Erreur -->
        <div id="error-state" class="hidden font-mono text-xs text-red-400">
            &gt; Contenu introuvable.
        </div>
    </main>

    <script>
        const path = window.location.pathname;
        const realSlug = path.replace('/l/', '');

        const contentCard = document.getElementById('content-card');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const unlockBtn = document.getElementById('unlock-btn');
        const downloadBtn = document.getElementById('download-btn');
        const lockOverlay = document.getElementById('lock-overlay');
        const successIcon = document.getElementById('success-icon');
        const statusDot = document.getElementById('status-dot');
        const statusLabel = document.getElementById('status-label');

        let currentProduct = null;

        async function init() {
            try {
                const response = await fetch(`/.netlify/functions/get-link?slug=${realSlug}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error);

                currentProduct = data.product;
                document.getElementById('file-name').textContent = currentProduct.name;
                document.getElementById('file-desc').textContent = currentProduct.description || 'Workflow ComfyUI';
                document.getElementById('price-display').textContent = '€' + parseFloat(currentProduct.price).toFixed(2);

                if (currentProduct.is_paid) showPaidState(currentProduct.download_url);

                loadingState.classList.add('hidden');
                contentCard.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }

        function showPaidState(url) {
            unlockBtn.classList.add('hidden');
            downloadBtn.classList.remove('hidden');
            if (url) downloadBtn.href = url;

            lockOverlay.classList.add('hidden');
            successIcon.classList.remove('hidden');
            successIcon.classList.add('flex');

            statusDot.classList.remove('bg-text-dim');
            statusDot.classList.add('bg-go');
            statusLabel.textContent = '// accès accordé';
            statusLabel.classList.remove('text-text-dim');
            statusLabel.classList.add('text-go');
        }

        unlockBtn.addEventListener('click', async () => {
            const orig = unlockBtn.innerHTML;
            unlockBtn.disabled = true;
            unlockBtn.innerHTML = '<span class="font-mono text-xs">traitement...</span>';

            try {
                const res = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: currentProduct.id })
                });
                const result = await res.json();

                if (result.success) {
                    setTimeout(() => location.reload(), 1000);
                } else {
                    alert('Erreur de paiement');
                    unlockBtn.disabled = false;
                    unlockBtn.innerHTML = orig;
                }
            } catch (e) {
                console.error(e);
                unlockBtn.disabled = false;
                unlockBtn.innerHTML = orig;
            }
        });

        init();
    </script>
</body>

</html>
